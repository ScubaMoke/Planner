<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mark's Master Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --dark:      #1a1a2e;
    --handyman:  #2c6e49;
    --aa:        #1d3557;
    --personal:  #6b4226;
    --light:     #f7f5f2;
    --mid:       #d0ccc7;
    --white:     #ffffff;
    --accent:    #e8c547;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--light);
    color: var(--dark);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--dark);
    color: var(--white);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    print-color-adjust: exact;
    -webkit-print-color-adjust: exact;
  }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 2px;
  }
  header .tagline {
    font-size: 0.78rem;
    color: var(--accent);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .month-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .month-nav button {
    background: none;
    border: 1px solid rgba(255,255,255,0.3);
    color: var(--white);
    width: 28px; height: 28px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .month-nav button:hover { background: rgba(255,255,255,0.15); }
  #month-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 2px;
    min-width: 140px;
    text-align: center;
  }

  /* ── AUTH ── */
  #auth-section {
    text-align: center;
    padding: 32px 24px 16px;
  }
  #auth-section p {
    margin-bottom: 12px;
    font-size: 0.9rem;
    color: #555;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-google { background: var(--white); color: var(--dark); border: 1.5px solid var(--mid); }
  .btn-print  { background: var(--dark);  color: var(--white); }
  #auth-status { font-size: 0.8rem; color: #777; margin-top: 8px; }

  /* ── MAIN LAYOUT ── */
  main {
    padding: 16px 20px;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    gap: 20px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── CALENDAR ── */
  .calendar {
    background: var(--white);
    border: 1.5px solid var(--mid);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .cal-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: var(--dark);
  }
  .cal-header div {
    text-align: center;
    padding: 7px 0;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--white);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }
  .cal-cell {
    min-height: 90px;
    border-right: 1px solid var(--mid);
    border-bottom: 1px solid var(--mid);
    padding: 5px 6px;
    position: relative;
    background: var(--white);
  }
  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-cell.weekend { background: #f0eeeb; }
  .cal-cell.empty { background: #f7f5f2; }
  .cal-cell.today { background: #fffbea; }
  .day-num {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--dark);
    margin-bottom: 3px;
  }
  .cal-cell.today .day-num {
    background: var(--accent);
    color: var(--dark);
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.72rem;
  }
  .event-pill {
    font-size: 0.62rem;
    padding: 1px 5px;
    border-radius: 3px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--white);
    cursor: default;
  }
  .event-pill.gcal  { background: #1a73e8; }
  .event-pill.handyman { background: var(--handyman); }
  .event-pill.aa    { background: var(--aa); }
  .event-pill.personal { background: var(--personal); }
  .more-events {
    font-size: 0.6rem;
    color: #888;
    margin-top: 2px;
  }

  /* ── LISTS ── */
  .lists {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  .list-card {
    border-radius: 8px;
    overflow: hidden;
    border: 1.5px solid var(--mid);
  }
  .list-header {
    padding: 9px 12px;
    color: var(--white);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 1.5px;
    print-color-adjust: exact;
    -webkit-print-color-adjust: exact;
  }
  .list-header.handyman { background: var(--handyman); }
  .list-header.aa       { background: var(--aa); }
  .list-header.personal { background: var(--personal); }
  .list-body { background: var(--white); }
  .list-row {
    display: flex;
    align-items: center;
    padding: 7px 10px;
    border-bottom: 1px solid #eeebe7;
    gap: 8px;
    min-height: 36px;
  }
  .list-row:last-child { border-bottom: none; }
  .list-row:nth-child(even) { background: #faf9f7; }
  .row-num {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--mid);
    min-width: 16px;
    text-align: right;
  }
  .row-input {
    flex: 1;
    border: none;
    background: transparent;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.82rem;
    color: var(--dark);
    outline: none;
    padding: 0;
  }
  .row-input::placeholder { color: #ccc; }
  .row-check {
    width: 15px; height: 15px;
    border: 1.5px solid var(--mid);
    border-radius: 3px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem;
    color: var(--white);
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
  }
  .row-check.checked.handyman { background: var(--handyman); border-color: var(--handyman); }
  .row-check.checked.aa       { background: var(--aa);       border-color: var(--aa); }
  .row-check.checked.personal { background: var(--personal); border-color: var(--personal); }
  .row-input.done { text-decoration: line-through; color: #aaa; }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 14px;
    font-size: 0.72rem;
    color: #aaa;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── PRINT ── */
  @media print {
    header .month-nav, #auth-section, .toolbar { display: none !important; }
    body { background: white; }
    main { padding: 8px; max-width: 100%; }
    .cal-cell { min-height: 70px; }
    .lists { page-break-inside: avoid; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Mark's Master Plan</h1>
    <div class="tagline">Burn with Purpose &nbsp;·&nbsp; Vita Ardens</div>
  </div>
  <div class="month-nav">
    <button id="prev-month">&#8249;</button>
    <div id="month-label"></div>
    <button id="next-month">&#8250;</button>
  </div>
</header>

<div id="auth-section">
  <p>Connect Google Calendar to pull your events into the planner.</p>
  <button class="btn btn-google" id="auth-btn" onclick="handleAuth()">
    <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.8C34.7 33.9 29.8 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-21 0-1.3-.1-2.7-.5-4z"/></svg>
    Connect Google Calendar
  </button>
  <div id="auth-status"></div>
</div>

<main>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--handyman)"></div>Handyman Jobs</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--aa)"></div>Authority Accelerator</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--personal)"></div>Personal</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1a73e8"></div>Google Calendar</div>
  </div>

  <div class="toolbar">
    <button class="btn btn-print" onclick="window.print()">🖨 Print</button>
    <button class="btn" style="background:var(--handyman);color:white" onclick="saveData()">💾 Save Lists</button>
  </div>

  <div class="calendar" id="calendar"></div>

  <div class="lists" id="lists"></div>
</main>

<footer>Ardent Living &nbsp;·&nbsp; On fire. On purpose. &nbsp;·&nbsp; Vita Ardens</footer>

<script>
// ── STATE ────────────────────────────────────────────────
const MONTHS = ["January","February","March","April","May","June",
                "July","August","September","October","November","December"];
const DAYS   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

let currentDate = new Date();
let currentYear  = currentDate.getFullYear();
let currentMonth = currentDate.getMonth();
let gcalEvents   = [];
let accessToken  = null;

const CLIENT_ID = "78445848559-gdm517n5ns9b1m1pbm5e8k1k7jd7jich.apps.googleusercontent.com";
const SCOPES    = "https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/calendar.calendarlist.readonly";

// ── LIST DATA ────────────────────────────────────────────
const listDefs = [
  { key: "handyman", label: "Handyman Jobs Queue",        cls: "handyman", placeholder: "Job description..." },
  { key: "aa",       label: "Authority Accelerator Tasks", cls: "aa",       placeholder: "Task or content item..." },
  { key: "personal", label: "Personal To-Dos",             cls: "personal", placeholder: "Task..." },
];

function loadLists() {
  const saved = localStorage.getItem("mark_planner_lists");
  return saved ? JSON.parse(saved) : {
    handyman: Array(10).fill({ text: "", done: false }),
    aa:       Array(10).fill({ text: "", done: false }),
    personal: Array(10).fill({ text: "", done: false }),
  };
}

let listData = loadLists();

function saveData() {
  localStorage.setItem("mark_planner_lists", JSON.stringify(listData));
  const btn = document.querySelector('.btn[onclick="saveData()"]');
  btn.textContent = "✓ Saved";
  setTimeout(() => btn.textContent = "💾 Save Lists", 1500);
}

// ── GOOGLE AUTH ──────────────────────────────────────────
function handleAuth() {
  if (CLIENT_ID === "YOUR_GOOGLE_CLIENT_ID") {
    document.getElementById("auth-status").textContent =
      "To connect Google Calendar: open this file, add your Google OAuth Client ID where indicated, and re-open.";
    return;
  }
  const redirectUri = window.location.href.split("?")[0];
  const url = `https://accounts.google.com/o/oauth2/v2/auth`
    + `?client_id=${CLIENT_ID}`
    + `&redirect_uri=${encodeURIComponent(redirectUri)}`
    + `&response_type=token`
    + `&scope=${encodeURIComponent(SCOPES)}`;
  window.location.href = url;
}

function checkAuthCallback() {
  const hash = window.location.hash;
  if (hash.includes("access_token")) {
    const params = new URLSearchParams(hash.substring(1));
    accessToken = params.get("access_token");
    window.history.replaceState(null, "", window.location.pathname);
    document.getElementById("auth-section").style.display = "none";
    fetchGCalEvents();
  }
}

async function fetchGCalEvents() {
  if (!accessToken) return;
  const start = new Date(currentYear, currentMonth, 1).toISOString();
  const end   = new Date(currentYear, currentMonth + 1, 0, 23, 59).toISOString();
  try {
    // Get all calendars first
    const calListRes = await fetch(
      `https://www.googleapis.com/calendar/v3/users/me/calendarList`,
      { headers: { Authorization: `Bearer ${accessToken}` } }
    );
    const calList = await calListRes.json();
    const allowedCalendars = [
      "scuba moke",
      "mark and shannon schedule",
      "birthdays",
      "holidays in united states"
    ];
    const calendars = (calList.items || []).filter(c => {
      const summary = (c.summary || "").toLowerCase().trim();
      const id = (c.id || "").toLowerCase().trim();
      return allowedCalendars.some(name => 
        summary === name.toLowerCase() || id === name.toLowerCase()
      );
    });

    // Fetch events from all calendars in parallel
    const allEvents = await Promise.all(calendars.map(async cal => {
      try {
        const res = await fetch(
          `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events`
          + `?timeMin=${start}&timeMax=${end}&singleEvents=true&orderBy=startTime`,
          { headers: { Authorization: `Bearer ${accessToken}` } }
        );
        const data = await res.json();
        return (data.items || []).map(ev => ({
          date: (ev.start.dateTime || ev.start.date).substring(0, 10),
          title: ev.summary || "(event)",
          type: "gcal"
        }));
      } catch(e) {
        return [];
      }
    }));

    gcalEvents = allEvents.flat();
    renderCalendar();
  } catch(e) {
    console.error("GCal fetch error:", e);
  }
}

// ── CALENDAR RENDER ──────────────────────────────────────
function renderCalendar() {
  const cal = document.getElementById("calendar");
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const today = new Date();

  let html = `<div class="cal-header">`;
  DAYS.forEach(d => html += `<div>${d}</div>`);
  html += `</div><div class="cal-grid">`;

  // Empty cells before first day
  for (let i = 0; i < firstDay; i++) {
    html += `<div class="cal-cell empty"></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const dow = new Date(currentYear, currentMonth, d).getDay();
    const isWeekend = dow === 0 || dow === 6;
    const isToday = d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear();

    let cls = "cal-cell";
    if (isWeekend) cls += " weekend";
    if (isToday)   cls += " today";

    const dayEvents = gcalEvents.filter(e => e.date === dateStr);
    const maxShow = 3;
    let evHTML = "";
    dayEvents.slice(0, maxShow).forEach(ev => {
      evHTML += `<div class="event-pill ${ev.type}" title="${ev.title}">${ev.title}</div>`;
    });
    if (dayEvents.length > maxShow) {
      evHTML += `<div class="more-events">+${dayEvents.length - maxShow} more</div>`;
    }

    const numEl = isToday
      ? `<div class="day-num"><span>${d}</span></div>`
      : `<div class="day-num">${d}</div>`;

    html += `<div class="${cls}">${numEl}${evHTML}</div>`;
  }

  html += `</div>`;
  cal.innerHTML = html;
}

// ── LISTS RENDER ─────────────────────────────────────────
function renderLists() {
  const container = document.getElementById("lists");
  let html = "";

  listDefs.forEach(def => {
    const rows = listData[def.key];
    html += `<div class="list-card">
      <div class="list-header ${def.cls}">${def.label}</div>
      <div class="list-body">`;
    rows.forEach((row, i) => {
      const doneClass = row.done ? " done" : "";
      const checkedClass = row.done ? ` checked ${def.cls}` : "";
      html += `<div class="list-row">
        <div class="row-num">${i+1}</div>
        <input class="row-input${doneClass}" 
               data-list="${def.key}" data-idx="${i}"
               type="text" 
               value="${escHtml(row.text)}" 
               placeholder="${def.placeholder}"
               oninput="updateItem('${def.key}',${i},this.value)">
        <div class="row-check${checkedClass}" 
             data-list="${def.key}" data-idx="${i}"
             onclick="toggleDone('${def.key}',${i},this,'${def.cls}')">
          ${row.done ? "✓" : ""}
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });

  container.innerHTML = html;
}

function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function updateItem(listKey, idx, value) {
  listData[listKey][idx] = { ...listData[listKey][idx], text: value };
}

function toggleDone(listKey, idx, el, cls) {
  const current = listData[listKey][idx].done;
  listData[listKey][idx] = { ...listData[listKey][idx], done: !current };
  saveData();
  renderLists();
}

// ── MONTH NAV ────────────────────────────────────────────
function updateMonthLabel() {
  document.getElementById("month-label").textContent =
    `${MONTHS[currentMonth]} ${currentYear}`;
}

document.getElementById("prev-month").onclick = () => {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  updateMonthLabel();
  renderCalendar();
  if (accessToken) fetchGCalEvents();
};
document.getElementById("next-month").onclick = () => {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  updateMonthLabel();
  renderCalendar();
  if (accessToken) fetchGCalEvents();
};

// ── INIT ─────────────────────────────────────────────────
checkAuthCallback();
updateMonthLabel();
renderCalendar();
renderLists();
</script>
</body>
</html>
